name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 테스트 및 JAR 빌드
        run: ./gradlew clean test bootJar

      - name: EC2로 JAR 파일 복사
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app"

      - name: EC2에서 애플리케이션 재시작
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "=== 기존 애플리케이션 종료 ==="
            pkill -f 'java -jar' || true

            echo "=== 프로세스 종료 대기 ==="
            while pgrep -f 'java -jar' > /dev/null
            do
              sleep 1
            done

            echo "=== 최신 JAR 실행 ==="
            JAR_FILE=$(ls -t /home/ubuntu/app/build/libs/*.jar | head -n 1)

            nohup java -jar "$JAR_FILE" > /home/ubuntu/app/app.log 2>&1 &

            echo "=== 실행 완료 ==="